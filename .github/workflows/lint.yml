name: lint

on:
  push:
  pull_request:

jobs:
  editorconfig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # editorconfig-checker reads .editorconfig and fails on violations
      - run: npx --yes editorconfig-checker
      - name: ascii check
        run: bash scripts/asciicheck.sh
